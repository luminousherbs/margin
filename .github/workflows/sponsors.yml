name: Generate Sponsors README
on:
  workflow_dispatch:
  schedule:
    - cron: '30 15 * * 0-6'
permissions:
  contents: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v2

      - name: Generate Sponsors 💖
        uses: JamesIves/github-sponsors-readme-action@v1.6.0
        with:
          token: ${{ secrets.GH_SPONSORS_TOKEN }}
          file: README.md
          organization: true
          minimum: 2500
          maximum: 2500

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: main
          folder: '.'
